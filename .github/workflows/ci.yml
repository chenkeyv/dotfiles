name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Validate setup script syntax
        run: |
          bash -n setup.sh
          bash -n scripts/fetch-tools.sh

      - name: Run ShellCheck
        run: shellcheck setup.sh scripts/fetch-tools.sh

      - name: Validate Go code
        run: |
          go test ./...
          CGO_ENABLED=0 go build -trimpath -o /tmp/dotfiles ./cmd/dotfiles
          /tmp/dotfiles pack -o cmd/dotfiles/payload
          CGO_ENABLED=0 go build -tags embedded -trimpath -o /tmp/dotfiles-embedded ./cmd/dotfiles
          /tmp/dotfiles-embedded list >/dev/null
          rm -rf cmd/dotfiles/payload

      - name: Validate Zsh config syntax
        run: zsh -n zsh/zshenv zsh/zprofile zsh/zshrc
