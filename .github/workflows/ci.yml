name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh

      - name: Validate setup script syntax
        run: bash -n setup.sh

      - name: Run ShellCheck
        run: shellcheck setup.sh

      - name: Validate Zsh config syntax
        run: zsh -n zsh/zshenv zsh/zprofile zsh/zshrc
